    <style>
        /* Transisi halus saat berganti tampilan */

            <div class="flex-1 w-full">
                <h1 class="text-3xl font-bold text-gray-900 mb-4">Katalog Produk</h1>
                <div class="flex flex-col sm:flex-row gap-3">
                    <!-- Pencarian -->
                    <input type="text" id="searchInput" placeholder="Cari brand atau model..." 
                        class="w-full sm:w-1/2 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    
                    <!-- Filter Kategori -->
                    <select id="categoryFilter" class="w-full sm:w-1/4 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                        <option value="all">Semua Kategori</option>
                        <option value="Catridge">Catridge</option>
                        <option value="Device Pod">Device Pod</option>
                    </select>
                </div>
            </div>

            <!-- Toggle Grid/List -->
            <div class="flex bg-gray-200 rounded-lg p-1 w-fit">
                <button id="btnGrid" class="px-4 py-2 rounded-md font-medium text-sm transition-colors bg-white shadow-sm text-blue-600" onclick="setView('grid')">
                    Grid
                </button>
                <button id="btnList" class="px-4 py-2 rounded-md font-medium text-sm transition-colors text-gray-600 hover:text-gray-900" onclick="setView('list')">
                    List
                </button>
            </div>
        </header>

        <!-- Container Produk -->
        <div id="productContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Data akan di-render di sini oleh JavaScript -->

    </div>

        // 2. Meratakan Data (Flattening) agar mudah di-filter
        let products = [];
        for (const type in rawData) {
            const categoryName = type === 'catridge' ? 'Catridge' : 'Device Pod';
            for (const brand in rawData[type]) {
                rawData[type][brand].forEach(item => {
                    products.push({
                        category: categoryName,
                        brand: brand,
                        model: item.model,
                        resistance: (item.resistance && item.resistance.length > 0) ? item.resistance.join(', ') : '-',
                        price: item.price ? `Rp ${item.price.toLocaleString('id-ID')}` : 'Harga tidak tersedia',
                        rawPrice: item.price || 0
                    });
                });
            }
        }

        // 3. State Management
        let currentView = localStorage.getItem('viewPreference') || 'grid';
        
        // Elemen DOM
        const container = document.getElementById('productContainer');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const btnGrid = document.getElementById('btnGrid');
        const btnList = document.getElementById('btnList');

        // 4. Fungsi Render Data
        function renderData() {
            const searchText = searchInput.value.toLowerCase();
            const selectedCategory = categoryFilter.value;

            // Proses Filter
            const filteredProducts = products.filter(p => {
                const matchText = p.brand.toLowerCase().includes(searchText) || p.model.toLowerCase().includes(searchText);
                const matchCategory = selectedCategory === 'all' || p.category === selectedCategory;
                return matchText && matchCategory;
            });

            // Atur class container berdasarkan view
            if (currentView === 'grid') {
                container.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6';
            } else {
                container.className = 'flex flex-col gap-4';
            }

            // Generate HTML Produk
            container.innerHTML = filteredProducts.map(p => `
                <div class="product-card bg-white border border-gray-100 rounded-xl shadow-sm hover:shadow-md p-5 flex ${currentView === 'list' ? 'flex-row items-center justify-between' : 'flex-col'}">
                    <div class="${currentView === 'list' ? 'flex-1' : 'mb-4'}">
                        <span class="text-xs font-semibold tracking-wider text-blue-600 uppercase">${p.brand}</span>
                        <h2 class="text-lg font-bold text-gray-800 leading-tight mt-1">${p.model}</h2>
                        <p class="text-sm text-gray-500 mt-1">Kategori: ${p.category}</p>
                        ${p.category === 'Catridge' ? `<p class="text-sm text-gray-500">Ohm: ${p.resistance}</p>` : ''}
                    </div>
                    <div class="${currentView === 'list' ? 'text-right' : 'mt-auto pt-4 border-t border-gray-100'}">
                        <span class="text-lg font-bold text-green-600">${p.price}</span>
                    </div>
                </div>
            `).join('');

            if (filteredProducts.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">Produk tidak ditemukan.</div>`;
            }
        }

        // 5. Fungsi Toggle View (Grid/List) dan simpan ke Cache/LocalStorage
        window.setView = function(view) {
            currentView = view;
            localStorage.setItem('viewPreference', view);
            
            // Update UI Tombol
            if(view === 'grid') {
                btnGrid.className = 'px-4 py-2 rounded-md font-medium text-sm transition-colors bg-white shadow-sm text-blue-600';
                btnList.className = 'px-4 py-2 rounded-md font-medium text-sm transition-colors text-gray-600 hover:text-gray-900';
            } else {
                btnList.className = 'px-4 py-2 rounded-md font-medium text-sm transition-colors bg-white shadow-sm text-blue-600';
                btnGrid.className = 'px-4 py-2 rounded-md font-medium text-sm transition-colors text-gray-600 hover:text-gray-900';
            }
            
            renderData();
        }

        // 6. Event Listeners
        searchInput.addEventListener('input', renderData);
        categoryFilter.addEventListener('change', renderData);

        // Inisialisasi awal
        setView(currentView);
    </script>
